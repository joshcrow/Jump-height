; PlatformIO project for the Jump Height firmware.
; Docs: https://docs.platformio.org/page/projectconf.html
;
; You normally don't run pio directly — use the CLI from the repo root:
;   ./tools/jump flash      (regenerates params, builds, uploads, self-tests)
;   ./tools/jump monitor    (serial console)
;
; Default target is the DFRobot FireBeetle ESP32 (DFR0478). If you have the
; newer FireBeetle 2 ESP32-E, switch default_envs to firebeetle2-e below.

[platformio]
default_envs = firebeetle32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
; default.csv on a 4MB-flash board leaves ~1.5MB LittleFS for the jump logs.
board_build.partitions = default.csv
; No library dependencies: the MPU-6050 is driven by our own minimal
; register-level driver (include/mpu6050_min.h) so cheap clone chips work.

; --- DFRobot FireBeetle ESP32 (DFR0478) — the v1 board ---
[env:firebeetle32]
board = firebeetle32

; --- DFRobot FireBeetle 2 ESP32-E (DFR0654) — uncomment if that's yours ---
; [env:firebeetle2-e]
; board = dfrobot_firebeetle2_esp32e

; --- Generic ESP32 dev board (fallback for bench testing) ---
[env:esp32dev]
board = esp32dev
