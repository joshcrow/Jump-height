; PlatformIO project for the Jump Height firmware.
; Docs: https://docs.platformio.org/page/projectconf.html
;
; Build & upload:  pio run -t upload
; Serial monitor:  pio device monitor -b 115200
;
; Default target is the DFRobot FireBeetle ESP32. If you have the newer
; FireBeetle 2 ESP32-E, switch default_envs to firebeetle2-e below.

[platformio]
default_envs = firebeetle32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
; default.csv on a 4MB-flash board leaves ~1.5MB for the LittleFS log storage.
board_build.partitions = default.csv
lib_deps =
    ; Friendly, well-documented driver for the MPU-6050 starter IMU.
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; --- DFRobot FireBeetle ESP32 (DFR0478) — your board ---
[env:firebeetle32]
board = firebeetle32

; --- DFRobot FireBeetle 2 ESP32-E (DFR0654) — uncomment if that's what you have ---
; [env:firebeetle2-e]
; board = dfrobot_firebeetle2_esp32e

; --- Generic ESP32 dev board (fallback for bench testing) ---
[env:esp32dev]
board = esp32dev
