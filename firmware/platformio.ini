; PlatformIO project for the Jump Height firmware.
; Docs: https://docs.platformio.org/page/projectconf.html
;
; You normally don't run pio directly — use the CLI from the repo root:
;   ./tools/jump flash      (regenerates params, builds, uploads, self-tests)
;   ./tools/jump monitor    (serial console)
;
; The field board is a DFRobot FireBeetle 2 ESP32-E (DFR0654): USB-C, CH340
; serial chip, ESP32-WROOM-32E module with 4 MB flash — all confirmed against
; DFRobot's specs and by reading the actual chip during bring-up. The default
; env below covers it AND the original FireBeetle ESP32 (DFR0478), because the
; flash size is pinned to what's really on the board (see the env comment).

[platformio]
default_envs = firebeetle32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

; Custom 4MB partition map (partitions.csv): no OTA slots — we flash over
; USB/web — so the reclaimed space becomes a bigger app partition (room for
; the BLE stack) and a bigger LittleFS for the jump logs.
board_build.partitions = partitions.csv

; BLE uses NimBLE-Arduino, NOT the stock ESP32 BLE (Bluedroid) library. NimBLE
; needs far less flash and RAM, and that budget is the whole reason the app +
; a large LittleFS fit in the no-OTA map above. Pinned to the 1.4.x API (the
; 2.x release changed several callback signatures the firmware relies on).
lib_deps = h2zero/NimBLE-Arduino @ ^1.4.2

; The MPU-6050 has no library dependency: it's driven by our own minimal
; register-level driver (include/mpu6050_min.h) so cheap clone chips work.

; --- The v1 board env (field-validated on a FireBeetle 2 ESP32-E) ---
; The generic firebeetle32 profile runs fine on the FireBeetle 2 — same ESP32
; silicon — EXCEPT its manifest claims 16 MB flash. The WROOM-32E module on
; the FireBeetle 2 has 4 MB, and a bootloader built for the wrong size fails
; to boot even when the upload verifies (this killed a real board for an
; afternoon). Pin everything to the chip that actually exists. On an original
; FireBeetle (DFR0478) with a genuine 16 MB chip this pin is the safe
; direction: it still boots, and simply leaves the extra space unused.
[env:firebeetle32]
board = firebeetle32
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

; PlatformIO also has a dedicated dfrobot_firebeetle2_esp32e profile, but the
; pinned env above is the configuration actually validated on the real board,
; so there's no reason to switch. Kept here for reference:
; [env:firebeetle2-e]
; board = dfrobot_firebeetle2_esp32e

; --- Generic ESP32 dev board (fallback for bench testing) ---
[env:esp32dev]
board = esp32dev
