; PlatformIO project for the Jump Height firmware.
; Docs: https://docs.platformio.org/page/projectconf.html
;
; You normally don't run pio directly — use the CLI from the repo root:
;   ./tools/jump flash      (regenerates params, builds, uploads, self-tests)
;   ./tools/jump monitor    (serial console)
;
; Default target is the DFRobot FireBeetle ESP32 (DFR0478). If you have the
; newer FireBeetle 2 ESP32-E, switch default_envs to firebeetle2-e below.

[platformio]
default_envs = firebeetle32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

; Custom 4MB partition map (partitions.csv): no OTA slots — we flash over
; USB/web — so the reclaimed space becomes a bigger app partition (room for
; the BLE stack) and a bigger LittleFS for the jump logs.
board_build.partitions = partitions.csv

; BLE uses NimBLE-Arduino, NOT the stock ESP32 BLE (Bluedroid) library. NimBLE
; needs far less flash and RAM, and that budget is the whole reason the app +
; a large LittleFS fit in the no-OTA map above. Pinned to the 1.4.x API (the
; 2.x release changed several callback signatures the firmware relies on).
lib_deps = h2zero/NimBLE-Arduino @ ^1.4.2

; The MPU-6050 has no library dependency: it's driven by our own minimal
; register-level driver (include/mpu6050_min.h) so cheap clone chips work.

; --- DFRobot FireBeetle ESP32 (DFR0478) — the v1 board ---
[env:firebeetle32]
board = firebeetle32
; The stock firebeetle32 manifest claims 16 MB flash; the real module on a
; field board is 4 MB (esptool warned during an actual upload). A bootloader
; configured for the wrong size is a boot-failure risk even when the upload
; verifies — pin everything to the chip that actually exists.
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

; --- DFRobot FireBeetle 2 ESP32-E (DFR0654) — uncomment if that's yours ---
; [env:firebeetle2-e]
; board = dfrobot_firebeetle2_esp32e

; --- Generic ESP32 dev board (fallback for bench testing) ---
[env:esp32dev]
board = esp32dev
