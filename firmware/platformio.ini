; PlatformIO project for the Jump Height firmware.
; Docs: https://docs.platformio.org/page/projectconf.html
;
; Build & upload:  pio run -t upload
; Serial monitor:  pio device monitor -b 115200
;
; The default env targets a classic ESP32-WROOM dev board. Uncomment the C3/S3
; env that matches your board (and set the I2C pins in src/main.cpp).

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    ; Friendly, well-documented driver for the starter IMU.
    ; Swap for your IMU's library if you upgrade (ICM-20948, LSM6DSO, ...).
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

[env:esp32dev]
board = esp32dev

; [env:esp32-c3]
; board = esp32-c3-devkitm-1
; build_flags = -D ARDUINO_USB_MODE=1 -D ARDUINO_USB_CDC_ON_BOOT=1

